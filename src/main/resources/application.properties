spring.application.name=templete

spring.datasource.driverClassName=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://localhost:3306/toy?characterEncoding=UTF-8&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=1111

mybatis.mapper-locations= classpath:mapper/**/*.xml
mybatis.configuration.default-statement-timeout= 30
mybatis.configuration.map-underscore-to-camel-case= true
mybatis.configuration.call-setters-on-nulls= true
mybatis.configuration.auto-mapping-unknown-column-behavior= none
mybatis.type-aliases-package=com.example.templete.domain

spring.jackson.mapper.sort_properties_alphabetically=false

spring.security.user.name=user
spring.security.user.password=1234
